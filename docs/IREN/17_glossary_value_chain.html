## Part 1 — 术语表（每个术语三件套）

| 术语 / 缩写 | 全称 | (a) 大白话是什么 | (b) 产业链环节（上游/下游是谁）| (c) 对本公司的意义 | 来源 |
|---|---|---|---|---|---|
| AI Cloud | — | 把装满 GPU 的数据中心当「算力出租屋」，按时长/算力卖给做 AI 的客户 | **中游**。上游=NVIDIA(芯片)/Dell(服务器)/电力；下游=Microsoft、AI 实验室、企业 | IREN 的未来主业；$13.1bn 合同的载体 | ★10-K |
| Bitcoin Mining | 比特币挖矿 | 用专用芯片算哈希换比特币，本质是「烧电换币」 | 中游。上游=电力/ASIC 矿机；下游=加密市场(挖出即卖) | 当前收入主体(Q3FY26 占 77%)，**正主动萎缩**，机器腾笼换 GPU | ★10-K |
| Hashrate | 算力/哈希率 | 矿机每秒能做多少次猜谜运算，越高挖到币越多 | 挖矿业的产能单位（如 EH/s） | 衡量挖矿产能；IREN 正缩减以让位 GPU | ★10-K |
| ASIC | Application-Specific Integrated Circuit（专用集成电路）| 只会干一件事(挖矿)的定制芯片，干别的不行 | 上游矿机(如 Bitmain S19j Pro) | 退役 ASIC = 巨额减值来源(Q3FY26 减值 $140.4m / $0.14bn) | ★10-K Note |
| GPU | Graphics Processing Unit（图形处理器）| 原本画游戏画面、现在是训练 AI 的「大脑」，能并行算海量数据 | 上游(NVIDIA 设计、台积电造、Dell 集成成服务器) | IREN 的核心生产资料；600k 颗 GPU 交付对应 NVIDIA 认股权归属 | ★10-Q Note17 |
| Blackwell / GB300 | NVIDIA GPU 架构/型号 | NVIDIA 最新一代 AI 芯片，比上代 H200 更快 | 上游最尖端环节，供给受限 | Microsoft 合同用 GB300、NVIDIA 合同用风冷 Blackwell | ◇ deck |
| Neocloud | — | 专做 GPU 出租的新一代云厂商，不像 AWS 啥都干，只卖 AI 算力 | 中游(对标 CoreWeave/Nebius) | IREN 的同业归类 | ◇ 行业 |
| Hyperscaler | 超大规模云厂商 | Microsoft/Amazon/Google 这种自建超大数据中心的巨头 | 下游(既是 IREN 客户，也是潜在对手) | Microsoft 既是最大客户也自建算力 → 客户即对手 | ◇ |
| MW | Megawatt（兆瓦）| 数据中心的「饭量」单位——能同时喂多少电；1MW≈能带几百~上千台 GPU 服务器 | 数据中心产能单位 | IREN 用「secured power MW」讲产能故事：810MW 运营→5GW(5,000MW) secured | ★10-K/◇deck |
| Liquid cooling / direct-to-chip | 液冷/直达芯片液冷 | 用液体而非风给芯片降温，高密度 GPU 太热必须液冷 | 数据中心中游技术 | Childress Horizon 1-4 为液冷，服务 Microsoft 合同 | ◇ deck |
| Behind-the-meter / grid-connected | 表后电力/并网 | 自己掌握发电或直连电网拿到便宜稳定的电 | 上游电力环节 | IREN 护城河自称：抢先锁定「电网接入+土地」 | ★10-K |
| PPA | Power Purchase Agreement（购电协议）| 跟电力公司签的长期买电合同，锁定电价电量 | 上游电力采购 | 决定 IREN 最大成本项(电费)的稳定性 | ★10-K |
| Colocation / powered shell / build-to-suit | 托管/带电外壳/定制代建 | 把建好(且通电)的数据中心空间租给客户放设备 | 中游商业模式选项 | IREN 部分采「自营 AI Cloud」而非单纯收租，赚算力服务费而非租金 | ★10-K |
| RPO | Remaining Performance Obligations（剩余履约义务）| 已签约、但还没确认成收入的金额=「锁定的未来收入」| 财务口径 | Q3FY26 仅 **$710.3m / $0.71bn**(12 个月内 $308.0m)——远小于宣传的 $13.1bn 合同总额 | ★10-Q |
| ARR | Annual Recurring Revenue（年化经常性收入）| 把「假设满产后一年能收多少」年化展示的**前瞻**数字 | 非 GAAP 营销口径 | 管理层主推 $3.1bn(已签约)→$3.7bn(目标)，**含尚未产生收入部分** | ◇ release 脚注 |
| Adj EBITDA | Adjusted Earnings Before Interest, Tax, Depreciation & Amortization | 利润加回利息/税/折旧摊销+各种「一次性」项后的口径 | 非 GAAP | Q3FY26 $59.5m；**FY26 起改定义**(剔除 debt conversion inducement)——可比性断层 | ★release |
| Convertible Notes | 可转换债券 | 可按约定价转成股票的借款，利率低但会稀释股东 | 融资工具 | IREN 主要融资方式，post-May26 本金 **~$6.75bn**，2033 到期墙 $4.15bn | ★10-Q Note |
| Capped Call | 上限看涨期权(对冲) | 公司买的保险，限制可转债转股时的稀释，但要按股价波动重估损益 | 衍生金融工具 | Q3FY26 未实现损失 $(23.7)m；与股价同向波动，扭曲净利润 | ★10-Q |
| Inducement expense | (债转股)诱导费用 | 为劝债主提前转股付的「甜头」，计入费用 | 财务 | Q2FY26 $111.8m；正是 Adj EBITDA 新口径剔除项 | ★release |
| ICFR / material weakness | Internal Control over Financial Reporting / 重大缺陷 | 公司自查账的内部控制有「可能出错」的漏洞 | 治理/审计 | FY2024 披露重大缺陷，2025-06-30 称已修复 | ★20-F |
| Going concern | 持续经营(存疑) | 审计师提示「这公司能不能活下去有疑问」 | 审计意见 | FY2024 20-F 带 going-concern 段落 | ★20-F |
| Direct listing / IPO | 直接上市/首次公开发行 | 公司股票首次上交易所交易 | 资本市场 | 2021-11 Nasdaq IPO；2024-02 由 Iris Energy 改名 IREN | ★ |
| Class A / Class B（双层股权）| Dual-class shares | 两种股票，B 类一股顶多股投票权，让创始人少持股也掌权 | 治理结构 | Roberts 兄弟 2 股 B 类(15×投票权)=**43.5% 投票权**，控股至 2033 | ★DEF 14A |

## Part 2 — 产业链地图（图文结合）

```
[上游] 电力 + 土地（自锁 PPA / 并网）｜ NVIDIA（GPU 设计）｜ Dell（GPU 服务器集成）｜ 电网/施工
   │  卖给 IREN：电（最大经营成本）、GPU 服务器（~$5.8bn Dell 订单对应 Microsoft 合同）、芯片
   │  ⚠️ 议价权高度偏上游：NVIDIA 芯片稀缺、且 NVIDIA 同时是客户+股东（认股权）→ 循环
   ▼
[中游 / ★ 本公司所处环节] ★ IREN：垂直整合 = 「锁电锁地 → 自建数据中心(风冷/液冷) → 装 GPU → 自营 AI Cloud 出租算力」
   │  增值：把「便宜的电+土地」转化为「高价值的 AI 算力小时」；Mirantis 收购补「编排/运维软件」
   │  主要对手：CoreWeave、Nebius、Applied Digital（neocloud）；Core Scientific、TeraWulf、Cipher（同样矿转 AI）
   ▼
[下游] Microsoft（$9.7bn/200MW 至 2031）｜ NVIDIA（$3.4bn 至 2032）｜ AI 实验室/企业
      IREN 卖给他们：AI 训练/推理算力（按合同/算力小时计费）
      ⚠️ 下游高度集中：两大客户 + 同一个 Childress(TX) 园区
```

### 本公司在链条中的位置判断
| 问题 | 回答 | 来源 |
|---|---|---|
| 上游/中游/下游？| **中游**，但向上游(电力/土地)和下游(自营云服务)双向延伸——垂直整合是核心卖点 | ★10-K |
| 议价权偏向谁？| **偏上游**：GPU 供给受 NVIDIA 控制；电力是最大成本。下游客户(MSFT/NVDA)信用强但集中、且自身就是巨头 | ▽ 判断 |
| 是否垂直整合？| 是。锁电锁地(上游)+自营 AI Cloud 与 Mirantis 软件(下游延伸) | ★/◇ |
| 最赚钱环节是不是本公司这环？| 目前**不是**——上游 NVIDIA 拿走芯片溢价；IREN 这环重资产、前期靠融资烧钱，盈利取决于满产后的算力定价 | ▽ |

## Part 3 — 产业链一句话总结

```
1. 这条产业链是：上游 电力+土地+NVIDIA 芯片+Dell 服务器 → 中游 IREN 自建数据中心+AI Cloud → 下游 Microsoft/NVIDIA/AI 企业
2. 本公司处在 中游(数据中心+算力运营)，靠 出租 GPU 算力 赚钱，主要成本来自 上游(电费 + GPU 折旧)
3. 它的议价权 中 偏弱：芯片受制于 NVIDIA、客户高度集中；护城河在「抢先锁定的电力+土地+自建能力」
4. 对外行的一句话：IREN 本质上是「一个把便宜的电和地，改造成 AI 算力'包租公'的重资产二房东——
   现在还在拿比特币挖矿的现金流和不断借来的钱，赌未来满租 Microsoft 和 NVIDIA」
```
