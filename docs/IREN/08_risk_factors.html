<script type="text/markdown" id="md"># IREN Limited — Risk Factors Distilled (Top 15, themed)

Distilled (not copied) from **10-K FY2025 Item 1A** risk-factor summary + body, the **FY2024 20-F** going-concern history, and Q3 FY26 10-Q updates.
**Tier:** ★ SEC direct · ◆ derived · ▽ external. Primary source: [10-K FY2025](https://www.sec.gov/Archives/edgar/data/1878848/000162828024038677/iren-20240630.htm) and [10-Q Q3 FY26](https://www.sec.gov/Archives/edgar/data/1878848/000187884826000030/iren-20260519.htm).

---

## Ranked top 8 (highest severity × likelihood for IREN's current strategy)

| # | Theme | Risk | Why it ranks high | Tier |
|---|---|---|---|---|
| **1** | **Financing / dilution** | Massive capex needs (~$5.8bn GPU capex for Microsoft alone) vs. a loss-making base; "may be unable to raise additional capital." History of net losses since 2018 inception. | The entire AI pivot is pre-funded by capital IREN must raise; convertibles, ATM, GPU leases (Dell $199.8M), NVIDIA private placement all dilute or lever. Liquidity is the binding constraint. | ★ |
| **2** | **Execution / delivery** | "Increased focus on HPC and AI services may not be successful." Must build Horizon 1–4 + Sweetwater, energize on schedule, pass customer delivery-acceptance gates. | Both $9.7bn (MSFT) and $3.4bn (NVDA) contracts are conditional on delivery/acceptance at Childress. Slippage = deferred/lost revenue + stranded capex. | ★ |
| **3** | **Customer concentration / counterparty credit** | AI revenue from a "small number of customers"; broader AI customer base is early-stage/private with insolvency risk. | Two anchor customers, one campus; see 03_customers.md + NVIDIA triple-role conflict. | ★ line 2808 |
| **4** | **Bitcoin price + halving** | Future success "depends significantly on the price of Bitcoin"; April-2028 halving cuts block reward 3.125→1.5625 BTC; rising global hashrate erodes share. | Mining is still the majority of *recognised* revenue today; FY2024 going-concern was explicitly BTC-price-driven. | ★ |
| **5** | **Power / grid / energy regulation** | Energy-intensive; restricted to renewable-power locations; outages or supply limits; ERCOT/BC Hydro rule changes; BC moratorium on new crypto-mining grid connections (upheld on appeal). | Power access is the whole business; grid-connection deposits already sunk ($11.7M Sweetwater 1; $13.5M+$4.1M Sweetwater 2). | ★ |
| **6** | **Supplier concentration / tariffs** | "Highly dependent on a small number of equipment suppliers" (1 mining-HW supplier, 4 HPC suppliers); GPU demand >> supply; new US tariffs (10% broad, proposed 100% on semis) + disputed origin (China) of 2024–25 miners → possible extra 25% tariff. | Single-vendor GPU dependence on NVIDIA; tariff disputes could be "material". | ★ lines 2473, 3518 |
| **7** | **Controls / governance / going concern history** | FY2024 carried a **going-concern explanatory paragraph** AND an **ICFR material weakness** (per 20-F/A 2025-03-20). Remediated as of 6/30/25, but "we have in the past and may in the future fail to maintain effective internal controls." | Recent restatement + remediation + auditor change (RCGT→KPMG Nov 2025) cluster around control quality. Pending securities class action. | ★ lines 3080, 8993 |
| **8** | **Crypto / digital-asset regulation** | Regulatory environment "in flux"; possible reclassification of digital assets as securities; exchange (Kraken) regulatory risk; proof-of-work → proof-of-stake transition could strand ASIC capex. | Could "restrict or eliminate" the market; SEC dropped Binance/Coinbase/Kraken suits in 2025 but framework remains unsettled. | ★ |

---

## Remaining themed risks (9–15)

9. **History of operating losses & fluctuating results** — net losses since 2018; operating results "fluctuate significantly." ★
10. **Indebtedness & liabilities** — convertible notes + GPU leases (Dell 24-mo $199.8M, $1 purchase option) limit cash-flow flexibility; parent guarantees given. ★ 10-Q line 6231
11. **Legacy litigation / settlement tail** — NYDIG / Non-Recourse SPV bankruptcy & receivership; Aug-2025 settlement ($18.2M over accrual) but final discharge timing uncertain (Canadian bankruptcy ~6 mo+). ★ Item 3
12. **Equipment failure / serial defects** — high single-manufacturer concentration in ASICs & GPUs; widespread defects could cause material outages. ★ line 2560
13. **Climate / disaster / property damage** — severe weather, uninsured damages at concentrated Texas/BC sites. ★
14. **Bitcoin technology obsolescence** — BTC could become redundant; proof-of-stake shift would impair SHA-256-only hardware. ★
15. **Incorporated-outside-US risks** — Australian-law shareholder rights differ; service of process / judgment enforcement against Sydney-based directors costly; FX (AUD functional currency). ★

---

## Analyst read

The risk profile has **shifted from "will Bitcoin keep us alive" (FY2024 going-concern) to "can we finance and deliver two $-billion AI contracts on time at one site, while concentrated on one GPU supplier."** The going-concern paragraph and material weakness are both *cured* (FY2025), so the dominant live risks are now **(1) financing the ~$5.8bn+ capex, (2) execution/delivery, (3) customer & supplier concentration around NVIDIA**. Bitcoin price/halving remains a real near-term earnings driver because mining is still most of *recognised* revenue today.
