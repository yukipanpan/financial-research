## 15.1 财务确认（最关键）

### (a) 营收 / 收入如何确认 ★

| 收入类型 | 合同性质 | 确认方法 | 确认时点 | ASC 依据 | 来源 |
|---|---|---|---|---|---|
| Bitcoin mining | 与矿池（Antpool/Foundry）算力服务合同，**非现金对价**（赚 BTC）| Point-in-time（按日）| 当日提供 hash 计算服务并取得 BTC（入账=取得日公允价值，当日清算）| ASC 606 | ★ 10-Q Note；CORRESP 2024-12-18 |
| AI Cloud Services | 云端 GPU 算力（H100/H200/Blackwell）售给第三方做 AI 训练/推理；on-demand 至 5 年长约 | Over-time（按期间/用量）| 随服务交付期间 | ASC 606 | ★ 10-Q |

**关键问答**：
- 收入是「服务费」（ASC 606，IREN 是算力服务商），**不是租金（ASC 842 房东）**。IREN 自有并运营 GPU/数据中心，向客户卖的是「云算力使用权」，不是把房子租给客户。这点很关键：H4/H16 里它不是 colocation 房东模式。
- **Deferred Revenue 存在且暴增**：9M FY26 现金流里 deferred revenue 变动 **+$119.5m**（★ 10-Q OCF），反映 AI Cloud 长约预收款大增（与 $3.4bn NVIDIA、Microsoft 等合同的预付/里程碑结构一致）。FY25 末递延收入余额：待查（交 Agent A 从 BS）。
- **自用产能**：Bitcoin 挖矿是「自用」（不产生外部租金，产出数字资产即时变现）。FY25 末/Q3 FY26 末 **均未持有任何 Bitcoin**（每日全部清算，BS 上数字资产 = $0，★ 10-K p.311 / 10-Q line 3224）。→ 无加密财库扰动（详见档案 16）。
- **最低承诺合同（take-or-pay / RPO）**：$3.4bn / 5 年 NVIDIA 合同 ★；$3.1bn ARR under contract（含 $0.7bn 来自 NVIDIA 5 年 air-cooled Blackwell，2027 初 ramp）◇ Q3 deck p.11；目标 CY26 末 ARR $3.7bn ◇。「Operational capacity fully contracted」◇ deck p.5。

### (b) 成本、费用及折旧如何确认 ★

| 成本项 | 计入科目 | 现金/非现金 | 备注（Q3 FY26, 3M）| 来源 |
|---|---|---|---|---|
| 电力 | Cost of revenue（COGS）| 现金 | 占 COGS 大头；Bitcoin COGS $35.3m（电力下降 $8.7m，spot 价低）| ★ 10-Q p.3581 |
| 运维人工 | COGS | 现金（+SBC）| AI Cloud COGS 仅 $4.6m（人头增加）| ★ |
| 设施 + 设备折旧 | **单列 D&A**（不在 COGS 内，IS 上「exclusive of depreciation」）| 非现金 | 3M FY26 D&A = **$121.2m**（9M $305.6m，YoY 大增因 GPU/矿机投产+S19j 加速折旧）| ★ 10-Q |

> ⚠️ **关键结构特征**：IREN 把折旧**单独列示**在营业费用区（"Cost of revenue exclusive of depreciation and amortization"）。这意味着所谓 segment "gross profit"（Q3 9M = $383.4m）**不含折旧**，看着很高；真实经营利润被巨额 D&A 吃掉（见档案 16 剥离测试）。读者极易被「毛利率 67%」误导。

### (c) 数据中心作为资产，还是其他核算方式？ ★

| 设施 | 核算方式 | 在哪张表 / 科目 | 来源 |
|---|---|---|---|
| 全部 6 运营站点 + Sweetwater 开发地 | **自有资产（PP&E）+ 自有 freehold 土地** | BS — Property, plant and equipment, net | ★ 10-K p.313, p.1212-1214 |
| 部分 GPU 设备 | **融资租赁**（finance lease，通过全资非追索 SPV；IREN 母公司提供担保）| BS — PP&E（finance-lease ROU 含在 PP&E）+ 租赁负债；折旧+利息 | ★ 10-Q line 1187；10-K p.585 |
| 经营租赁 | 少量办公等 | BS — Operating lease ROU / 租赁负债 | ★ 10-Q（BS line 245/280/304）|

> **结论**：IREN 是**垂直一体化、重资产自有**模式 —— 自有数据中心、电气基础设施、**freehold 土地**（BC 三地 10/11/21 acres；Childress ~500 acres；Sweetwater ~1,836 acres）。GPU 部分通过融资租赁取得（但 ROU 进 PP&E，类自有）。**没有任何站点是 JV / 权益法 / 表外**（无少数股东、无 VIE 不并表）。这与 colocation/hosting 轻资产同业（依赖第三方托管或短租地）形成对比，是公司刻意强调的「control」差异化。

## 📝 运营/重资产专题总结

```
1. 财务确认：收入按 ASC 606 服务费确认（不是 ASC 842 租金）—— Bitcoin point-in-time（日清算，无币库），
   AI Cloud over-time（含巨额预收 deferred revenue 9M +$119.5m）。成本大头=电力(现金)；
   折旧单列、不入 COGS（D&A 9M FY26 = $305.6m）→「毛利率 67%」严重高估真实盈利。
   GPU 5 年寿命=中性；矿机 2 年=保守。利息资本化金额待 Agent C 补。

2. 资产与控制权：6 个运营站点 + 2 个 Sweetwater 开发地，全部 100% 全资自有 freehold（无 JV/权益法/VIE，
   无少数股东）。GPU 部分融资租赁（非追索 SPV，但母公司担保，实质在表内）。
   唯一表外→并表变化点：Nostrum (Spain, 490MW) + Mirantis 两笔 pending acquisition（未交割）。

3. 产能与交付：FY25 末已投产 ~810MW（多为挖矿）；阶梯目标 480MW(2026,150k GPU)→1,210MW(2027,+730MW)
   →5GW(2028+,10×)。担保电力从 2,910MW(FY25 10-K)升至 5GW(Q3 deck)。Sweetwater 1 substation「on schedule」
   通电、Childress 长期兑现 → 近期执行可信；但 1,210MW/5GW 多为 2027-2028 远期，未经验证。
   在洽谈：Kiowa OK 1,600MW + Sweetwater 剩余 1,700MW + EU/APAC，均未签约。

4. 最大会计判断点 / 红旗：
   (a) 折旧单列于 COGS 之外 → 段毛利虚高，掩盖真实经营亏损（Q3 FY26 营业亏损 $(233.5)m）。
   (b) Impairment 反复（FY23 $105m、9M FY26 $188m）= 挖矿→AI 转型的设备 displacement 成本，
       本质是「重资产快速过时」的经常性代价，不应当作一次性。
   (c) 容量口径混用（810MW 挖矿 vs 480MW AI 目标）易误导。
   → 验证 H5/H15：5GW/1,210MW 阶梯属实，控制权清晰（全资自有 freehold + GPU 融资租赁），
     收入/折旧确认清楚（606 服务费 + 单列折旧），但远期产能未经验证、转型减值持续吞噬利润。
