## 一句话结论
IREN 是由比特币矿企转型的、垂直整合的 **AI Cloud（GPU 数据中心）provider**：手握 Microsoft（$9.7bn）+ NVIDIA（$3.4bn）大合同与 5GW 锁定电力，目标 ARR $4.4bn；但当前 GAAP 收入仍以萎缩的挖矿为主、季度 AI Cloud 收入仅 $33.6m，账面净利润被可转债公允价值波动严重扭曲，扩张高度依赖持续融资。**成败系于「执行 + 融资」双飞轮。**
