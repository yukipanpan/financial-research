<script type="text/markdown" id="md"># IREN Limited — 06 Capital Structure (Debt / Converts / Leases / Liquidity)

> Agent C deliverable. CIK 0001878848. FY ends June 30. Unit rule: 1亿USD = $100M = $0.1B.
> Primary period: Q3 FY26 10-Q (quarter ended **March 31, 2026**), plus post-quarter 8-Ks.
> Source legend: ★ primary filing (exact figure) · ◆ derived from primary · ◇ secondary · ▽ my estimate.

---

## 0. Snapshot (as of March 31, 2026 unless noted)

| Item | Value | Source |
|---|---:|---|
| Cash & cash equivalents | **$2,213.3M ($2.2B)** | ★ [10-Q BS](data/research/IREN/raw/10Q_2026-03-31.htm) |
| Convertible notes payable (carrying) | **$3,687.8M ($3.7B)** | ★ 10-Q Note 16 |
| Finance lease liability (curr + non-curr) | $122.2M + $152.1M = **$274.3M** | ★ 10-Q BS |
| Operating lease liability | $0.5M + $2.3M = $2.8M | ★ 10-Q BS |
| Total debt (converts + finance leases) | **≈ $3,962.1M ($4.0B)** | ◆ sum |
| **Net debt** (total debt − cash) | **≈ $1,748.8M ($1.7B)** | ◆ |
| Total stockholders' equity | $2,664.5M | ★ 10-Q BS |
| Total assets / liabilities | $7,264.9M / $4,600.4M | ★ 10-Q BS |
| Deferred revenue (customer prepay, c+nc) | $120.4M | ★ 10-Q |
| Cash AFTER post-quarter $3.0B note | ~$2.6B reported at Apr 30 2026 (mgmt) | ◇ Phase-0 brief / 8-K 2026-05-14 |

Note: convertible notes are **senior unsecured**. There is **no traditional secured term loan / revolver**. GPU purchases are financed by (a) finance leases (Dell Financial Services et al.) and (b) customer prepayments (Microsoft 20% upfront).

---

## 1. Convertible Notes — full terms (★ 10-Q Note 16 key-terms table)

| Issuance date | Dec 6, 2024 | Jun 13, 2025 | Oct 14, 2025 | Dec 8, 2025 | Dec 8, 2025 |
| Maturity | Jun 15, 2030 | Dec 15, 2029 | Jul 1, 2031 | Jun 1, 2032 | Jun 1, 2033 |
| **Remaining principal (Mar 31 26)** | $212.3M | $233.4M | $1,000.0M | $1,150.0M | $1,150.0M |
| Original principal | $440.0M | $550.0M | $1,000.0M | $1,150.0M | $1,150.0M |
| Stated coupon | 3.25% | 3.50% | 0.00% | 0.25% | 1.00% |
| Effective rate | 3.87% | 4.22% | 0.37% | 0.45% | 1.18% |
| Conversion price | $16.81 | $13.64 | $85.63 | $51.40 | $51.40 |
| Conversion rate /$1,000 | 59.4919 | 73.3299 | 11.6784 | 19.4553 | 19.4553 |
| Net proceeds | $311.6M | $392.4M | $927.3M | $1,033.2M | $1,040.8M |

**Total carrying convertible debt at Mar 31, 2026 = $3,687.8M** (★). All classified non-current; **$0 due within one year**.

### Post-quarter (subsequent event): **2033B Notes**
- May 14, 2026: issued **$3.0B** of **1.00% Convertible Senior Notes due Dec 1, 2033** (incl. $400M greenshoe). Conversion price **$73.07** (rate 13.6848/$1,000). Net proceeds ≈ $2.96B; $201.3M used for capped calls. ★ [8-K 2026-05-14](data/research/IREN/raw/8k/8K_2026-05-14_nvidia.htm)
- This roughly **doubles** convertible principal to **≈ $6.7B** (3.7B carrying + 3.0B new).

### Dec 2025 induced conversion / repurchase (★ Note 16)
- Repurchased **$544.3M** principal of 2030 + 2029 Notes for **$1,632.4M cash** (accounted as induced conversion). Recorded **$111.8M inducement expense** + $981.0M charge to APIC. This is why 2030/2029 principal collapsed from $440M/$550M → $212M/$233M.

### Key indenture terms (common across series; ★ 8-Ks)
- Senior unsecured; **no financial maintenance covenants** (only customary merger/asset-sale and reporting covenants).
- Cross-default trigger: defaults on other borrowed-money debt ≥ **$125M**.
- Company can settle conversions in cash, shares, or a mix (cash-settlement flexibility reduces forced dilution).
- Fundamental-change put at par; make-whole on early redemption.

## 3. Prepaid Forward Share Purchase Contracts (★ Note)
- 2030 Prepaid Forward: 5.7M shares, exp Aug 15 2030, $73.7M.
- 2029 Prepaid Forward: 8.818M shares, exp Feb 15 2030, $92.5M.
- Reclassified to equity at fair value $665.4M (Nov 19 2025). These effectively pre-bought shares to neutralize convert dilution.

## 4. GPU / Equipment Financing (finance leases) (★ 10-Q Note 9 & MD&A)
- Group entered **lease financing for 100% of GPU purchase price**, structured as **24-month and 36-month finance leases** with $1 purchase option (treats as ownership; ROU asset in PP&E).
- **Dell Financial Services facility (Nov 5, 2025): $199.8M, 24-month lease, $1 buyout, parent guarantee.** ★ MD&A
- Finance lease ROU assets = $301.8M gross; finance lease liabilities = **$274.3M** total at Mar 31 26.
- Additions to ROU assets in exchange for lease liability (9M FY26): **$291.6M** (non-cash). ★ CF
- This is the "GPU financing" funding leg referenced in Phase-0.

**Observation:** No near-term wall before late 2029. **The wall is heavily back-loaded to 2031–2033 (~$6.3B of $6.7B due in 2031–33).** Both 2033 tranches ($1.15B + $3.0B) mature in the same year. Refinancing/conversion concentration risk in 2031–2033 is the single biggest structural item.

## 6. Liquidity & Runway math (★ 10-Q MD&A + ◆ derived)

- Cash Mar 31 26: **$2,213.3M**; + post-quarter $3.0B note net ≈ $2.96B; + ATM issuance. Mgmt reports **~$2.6B cash at Apr 30 2026** (◇ brief).
- **9M FY26 operating cash flow: +$289.3M** (positive). ★
- **9M FY26 investing outflow: −$2,608.9M** (capex: $1,669.2M PP&E + $685.8M computer hardware + $107.6M intangibles). ★ — this is the real burn.
- 9M FY26 financing inflow: +$3,968.8M (converts $3,299.6M + share issuance $2,630.8M − induced conversion $1,623.5M − capped calls $252.3M). ★

**Runway logic (▽ my framing):** Operations are roughly cash-neutral-to-positive; the cash drain is **capex**, not opex. Required GPU capex is enormous: Microsoft = ~$5.8B GPU capex; NVIDIA $3.4B contract needs ~$1.6B Dell GPUs; Dell purchase commitments $5.8B (Nov) + $2.3B + $1.2B (Mar) + $1.6B (May). Total announced GPU/Dell purchase obligations ≈ **$10–12B+** vs ~$2.6B cash + $6.7B converts already raised.
- **Conclusion:** Cash on hand alone cannot fund the 5GW build. Runway depends entirely on **continued capital-markets access** (ATM up to $6.0B, more converts, GPU finance leases) **plus Microsoft/NVIDIA prepayments**. Management explicitly says it is "actively exploring alternative financings" and that future financings "could be material" — i.e., **further dilution/leverage is planned, not optional**.

## 8. Red flags (capital structure)
1. **Back-loaded $6.3B maturity wall 2031–2033**, with $4.15B in 2033 alone (two tranches same year).
2. Convertible **conversion prices ($73–86) sit well above the Mar 31 26 share price ($34.28)** → notes are deeply out-of-the-money; if stock stays low, these become **cash repayment** obligations (refinancing risk), not equity conversions.
3. Funding is **serial equity + equity-linked dilution** (ATM $6B, $6.7B converts, NVIDIA right) — see 13_equity_options_vesting.md.
4. Capex obligations (~$10–12B announced) **dwarf** current cash; execution depends on uninterrupted market access.
5. $111.8M one-off inducement expense + $1.6B cash spent buying back cheap 2029/2030 converts — expensive de-leveraging of in-the-money notes.
