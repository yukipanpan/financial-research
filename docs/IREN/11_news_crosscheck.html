## A. 核对结论（先看这里）

**好消息**：所有**重大**交易（Microsoft / NVIDIA 合同、可转债、收购 Nostrum/Mirantis、NVIDIA 认股权）都既有新闻稿、也有对应 SEC 8-K/10-Q，互相印证 ✅。SEC 列表确认**已到今天**，无遗漏的已申报材料。

**补漏（我此前报告未覆盖或需更新的 6 项）**：
1. ⚠️ **ARR 目标已从 $3.7bn 上调至 $4.4bn**（2026-05-26 8-K），原因是新签 **$1.6bn Dell 风冷 Blackwell 采购协议**（2026-05-19）。我的 REPORT v1.0 用的是 $3.7bn → **已在 v1.1 更正**。
2. ⚠️ **早期 AI Cloud 客户是「未具名的 leading AI companies」**，不止 Microsoft/NVIDIA。2025-10-07 公告：23k GPU 中已签约 11k ≈ **$225m ARR**，~2 年合同、**~2 年收入回本（payback）**，部署在 Prince George(BC) + Childress Horizon 1&2。这条**未单独 8-K 申报**（个别合同未达 Item 1.01 重大性），只在新闻稿/10-Q。
3. ⚠️ **GPU 部署爬坡序列**（此前报告压缩处理）：2.4k(Jul'25) → 8.5k(Aug'25) → 10.9k(Aug'25，获 NVIDIA "Preferred Partner" 地位) → 23k(Sep'25，ARR 目标>$500m) → 150k(Mar'26 目标)。
4. 🟢 **2026-05-18 收购 Awaken**（"support global brand growth"）——**无 8-K，属非重大品牌/营销 tuck-in**，不影响财务分析；登记备查。
5. 🟢 **管理层任命**：CFO **Anthony Lewis**（2025-09-08，对应 8-K Item 5.02）；Chief Innovation Officer **John Gross**（2026-02-17）。
6. 🟢 **2026-02-13 纳入 MSCI USA Index**——被动资金事件，非基本面，备查。

**单位回本是关键新数据点**：◇ 公司说法「~2-year revenue payback」——即一颗 GPU 的合同收入约 2 年收回其采购成本。这是理解 AI Cloud 单位经济与「为何敢大举举债买卡」的核心。
