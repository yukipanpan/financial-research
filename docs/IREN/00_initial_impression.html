### (a) 一句话业务骨架
```
公司一句话定义：垂直整合的 AI Cloud（GPU 数据中心）provider，由比特币矿企转型而来；
                自有「电网接入土地+电力」横跨北美/欧洲/APAC，自建数据中心并出租 GPU 算力。
主要分部 / 业务线：① Bitcoin Mining（萎缩中，仍是当前收入主体）② AI Cloud（GPU 租赁，ramp 中）
                  ③ 数据中心/电力开发平台（底层资产）
主要收入来源：当前=比特币挖矿；未来=AI Cloud（Microsoft $9.7bn / NVIDIA $3.4bn 合同驱动）
```

### (b) 初始逻辑：管理层这季度想让你看什么
| 观察项 | 内容 | 我的解读 / 警觉 |
|---|---|---|
| 叙事锚（被反复强调）| $9.7bn Microsoft 合同；$3.4bn NVIDIA 合同；5GW NVIDIA 合作 + $2.1bn 认股权；$3.1bn→$3.7bn ARR；2026→2028 产能阶梯 | 全是**前瞻/合同**口径，不是已实现收入。管理层在卖「未来 ramp」 |
| 讲故事用的口径 | ARR（非 GAAP 前瞻）、Adj EBITDA（非 GAAP）| ⚠️ 回避 GAAP 收入/毛利；ARR 含「尚未产生收入」部分 |
| 今年首次出现 / 改口径 | Adj EBITDA **FY26 起改定义**（剔除 debt conversion inducement expense）；ARR 拆分口径 | ⚠️ 制造可比性断层 → 联动档案 14 |
| 被弱化 / 缺席 | GAAP 收入 $144.8m（**降** 39.9m）；净亏 $(247.8)m（**扩大**）；Adj EBITDA $59.5m（**降**）| ⚠️ 收入在转型期下滑，亏损扩大 — 与「高增长」叙事矛盾 |
| Risk/Subsequent 矛盾线索 | 近期 capex 靠「现有现金 $2.6bn + 经营现金流 + GPU 融资 + 其他融资」覆盖；多项融资 underway | ⚠️ 巨额产能扩张高度依赖**持续外部融资**；执行/交付/融资三重风险 |

### 待验证假设清单（后续历史精读逐条回答）
| # | 假设 | 来源/触发点 | 派给 | 状态 |
|---|---|---|---|---|
| H1 | $3.1bn「ARR under contract」与实际季度收入 $144.8m 差距巨大 → AI Cloud 实际已确认收入有多少？收入确认时点（GPU 交付/调试/在役）如何？ | Release 脚注 ★ | Agent A+D | 待验证 |
| H2 | 收入下滑+净亏扩大主要由比特币挖矿萎缩+硬件减值驱动 → 拆分两段（Mining vs AI Cloud）各自收入/毛利趋势 | Release ★ | Agent A | 待验证 |
| H3 | FY2024 发生过**财务重述**（20-F/A + 6-K/A + 3 封 SEC 问询函）→ 改了什么科目？影响可比性多少？ | EDGAR filing 史 ★ | Agent B | 待验证 |
| H4 | Adj EBITDA FY26 改定义 + 多个非 GAAP 口径 → 剥离非经营扰动项后真实经营利润如何？（减值 $140.4m、capped call $23.7m）| Release ★ | Agent B+D | 待验证 |
| H5 | 5GW/1,210MW 产能阶梯的**控制权与交付管线**：哪些自有/合资/租赁？已交付 vs 计划？利用率？ | Deck/Release ◇ | Agent D | 待验证 |
| H6 | 资本结构：可转债 + capped call + NVIDIA $70 认股权（30M 股）+ GPU 融资 → 到期墙 + 摊薄 + 现金跑道能否撑到 ramp？ | Release ★ | Agent C | 待验证 |
| H7 | Microsoft $9.7bn / NVIDIA $3.4bn 合同的**法律实质**（8-K Item 1.01 原文）：期限、最低承诺、终止条款、对手方集中度？ | 8-K 1.01 ★ | Agent C+E | 待验证 |
