## ① The NVIDIA 30M-share $70 Investment Right ⭐ (★ 10-Q Note 17, 8-K context)

| Term | Detail |
|---|---|
| Instrument | "Investment Rights" (warrant-like) via Securities Purchase Agreement, **May 7, 2026** |
| Counterparty | NVIDIA Corporation (the "Purchaser") |
| Shares | **30,000,000 ordinary shares** (subject to adjustment) |
| Exercise price | **$70.00 per share** |
| Max gross proceeds to IREN | **up to ~$2.1 billion** (if fully exercised) |
| Vesting | **In tranches, vesting on delivery of up to 600,000 NVIDIA GPUs** |
| Exercisability | Any time on/after issue date, through **May 7, 2031** (5-yr) |
| Lock-up | 6-month transfer restriction on shares per vested tranche |
| Exemption | Private placement, Sec 4(a)(2) / Reg D Rule 506 |

**Dilution if fully exercised:** 30.0M new shares ÷ (357.4M Apr-30 + 30.0M) = **+8.4% of post-issue ordinary shares** (◆). On basic Mar-31 base of 341.0M: 30/341 = **+8.8%** (◆).
- IREN receives **$2.1B cash** in exchange — accretive to cash, dilutive to ownership. Strike $70 vs Mar-31 price $34.28 → **~2× above market**, so only exercised if shares roughly double (good for existing holders) AND NVIDIA hits 600k-GPU delivery volume.
- **Substance:** NVIDIA gets equity upside calibrated to how many of its own GPUs IREN buys/deploys — vendor financing aligned to throughput (see 07_related_parties.md).

### 2.1 Option & RSU pools (★ 10-Q Note 18)
| Award type | Outstanding Mar 31 26 | WA price / GDFV | Note |
|---|---:|---:|---|
| Stock options | **5,508,450** | WA exercise **$65.98** | 640,266 vested; WA life 7.07 yr; **0 granted in 9M FY26** |
| Service-condition RSUs | **14,751,852** | GDFV $11.47 | 379,741 vested; intrinsic $505.7M |

| **RSU subtotal** | **~20.37M** | | |

- **2023 LTIP: 0 shares left** for future issuance. **2025 Omnibus Plan: 17.5M shares reserved** (approved Nov 2025). ★
- Loan-funded shares: 521,206 (treated as options).

### 2.2 SBC trend (★ 10-Q Note 18)
| Period | Stock options | Service RSUs | Perf RSUs | **Total SBC** | SBC/Revenue |
|---|---:|---:|---:|---:|---:|
| Q3 FY26 (3mo) | $2.2M | $25.9M | $3.5M | **$31.5M** | 21.7% |
| 9M FY26 | $23.4M | $102.5M | $36.2M | **$162.1M** | **28.4%** (of $569.8M rev) |
| 9M FY25 | $9.4M | $13.1M | $1.4M | **$23.9M** | 7.6% |

→ **SBC up ~6.8× YoY** (9M); now **~28% of revenue** — very high, reflects aggressive equity comp during AI pivot. All SBC booked in SG&A (none capitalized).
- Plus **$43.5M payroll taxes on SBC** (9M FY26) in SG&A — a real cash cost of the equity machine.

### 2.3 Vesting (★ 10-Q)
- 2023 LTIP RSUs: 3 tranches — 2 time-based + 1 performance-based.
- Service RSUs: $86.2M unrecognized, ~1.19 yr remaining. Market RSUs: $29.6M unrecognized, ~1.65 yr. Options: $38.2M unrecognized, ~4.40 yr.
- Market-condition RSUs (3.73M granted FY26) vest after 3 yr on TSR vs Russell 2000.

## 📝 Summary
1. **Concentration:** Founder brothers control 43.5% voting via 15× B-class; sunset 2033. Not controlled company.
2. **SBC burn:** ~28% of revenue, +6.8× YoY; Co-CEOs $72.6M each (96% equity) FY25 — generous.
3. **Dilution speed:** +99M shares in 9 months (29%↑); converts ($6.7B) + NVIDIA right (30M @ $70) + $6B ATM = structural, ongoing.
4. **NVIDIA right:** 30M shares @ $70 (~$2.1B), vests on 600k-GPU deliveries, exp 2031 → +8.4% dilution, vendor-aligned.
5. **Warning signs:** ✅ no repricing; 🟡 mega-grants to Co-CEOs; 🟡 founder Sep-25 sells; 🟠 serial dilution + negative APIC (−$1.73B) from convert/forward equity engineering.
6. **Alignment:** Co-CEO pay is ~all equity and price-hurdled ($75 options, TSR PRSUs) → reasonably aligned with shareholders, but absolute quantum is large.
