<script type="text/markdown" id="md"># IREN Limited — Open Questions & Low-Confidence Items

Honest list of what is **not resolved** from primary SEC filings as of this research pass (data through Q3 FY26 10-Q / 8-Ks to 2026-05-26). Tier: ★ SEC · ◆ derived · ▽ external/estimate.

---

## A. Concentration / customers (Agent E scope)

1. **Per-customer AI revenue % (Microsoft vs NVIDIA vs other)** — NOT disclosed; 10-K only says "small number of customers." The $9.7bn/$3.4bn contracts post-date FY2025, so no realised-revenue split exists yet. **待查** until a 10-Q/10-K reports segment customer %.
2. **Deferred revenue & RPO/backlog quantification** — Microsoft prepays 20%/tranche; how much deferred revenue is on the BS and what % of the $13.1bn contracted book converts within 12 months is **待查** (sibling 05_accounting_policies flagged for Agent A; sibling cites company ARR target ~$3.7bn FY2026 ◇ but that is IR guidance, not SEC).
3. **NVIDIA investment-rights accounting** — how IREN accounts for the 30M $70 warrants (liability vs equity, vesting-on-GPU-delivery) and the resulting dilution path is **待查** (likely Agent C/B).

## B. Acquisitions (H8)

4. **Mirantis & Nostrum purchase-price allocation / goodwill / intangibles** — explicitly "not yet finalized" by the company; goodwill, customer intangibles, and any bargain element **待查** pending a future filing. Only an unrelated **$1.2M** goodwill is recorded today.
5. **Mirantis strategic rationale depth** — is it primarily software/orchestration IP, an acqui-hire of cloud engineers, or a customer book? Filings describe "cloud software and services provider" but give no revenue/headcount. **待查 / low confidence.**
6. **Nostrum 490MW deliverability** — Spanish pipeline maturity, grid-connection status, permitting, and whether the 490MW is operating vs greenfield is **待查** (10-Q calls it a "developer," implying mostly pipeline). First European jurisdiction = unquantified regulatory risk.
7. **Will either deal close?** Mirantis outside date Aug 3, 2026 + HSR; Nostrum customary conditions. Closing not confirmed in available filings. **待查.**

## C. Governance / control

8. **Founder voting power: 43.5% (DEF 14A, Aug 31 2025) vs 35.4% (10-K, Aug 15 2025)** — the ~8pp gap two weeks apart is unreconciled; most likely differing inclusion of exercisable options/vested RSUs. **待查** (would need the proxy ownership-table footnotes line-by-line).
9. **Founder Sept-2025 open-market sells** — Form 4 + Rule 144 sells confirmed by sibling 07, but **exact share counts, prices, and 10b5-1 plan status are 待查** (XSL-rendered Form 4s lacked machine-readable tags; need raw `.xml`).
10. **Controlled-company Nasdaq exemptions** — DEF 14A does not name Rule 5615(c) "controlled company" exemptions; control is constitutional (B-shares) under Australian law. Whether IREN claims any Nasdaq governance exemptions (e.g., compensation-committee independence) is **待查 / low confidence**.

## D. Controls / accounting (cross-agent)

11. **Material-weakness specifics** — FY2025 10-K confirms the FY2024 weakness (per 20-F/A 2025-03-20) is **remediated as of 6/30/25**, but the precise *nature* of the original weakness (which controls failed) and the remediation steps are summarized, not detailed. Worth reading the 20-F/A Item 15 in full. **partially 待查.**
12. **Cash-flow restatement magnitude** — the 2025-03-20 20-F/A reclassified mined-BTC sale proceeds operating↔investing per SEC Office of Crypto Assets; the $ amount reclassified per year is **待查** (sibling 04b_cash_flow flagged capitalized-interest and PP&E items for Agent A).
13. **GPU depreciation life & impairment risk** — sibling 02/05 flag GPU 3–4yr depreciation could turn AI segment margins negative; quantitative useful-life sensitivity is **company-undisclosed / 待查**.

## E. Financing / capital (cross-agent — Agents B/C)

14. **Total funding gap vs ~$5.8bn Microsoft GPU capex + Nostrum cash + GPU leases** — how IREN bridges the capex (converts, ATM, NVIDIA $2.1bn rights, Dell/other GPU leases) and the resulting net leverage is **待查** (Agent B capital structure).
15. **2030 convertible notes terms / covenants** — sibling 05/06 flag the convertibles as the key debt wall; covenant detail **待查** (Agent C from Debt note).

---

### Confidence summary
- **High confidence (★ direct SEC):** corporate timeline, dual-class 15× B-share control, B-share sunset Nov 17 2033, $72.6M Co-CEO pay & 993:1 ratio, PRSU hurdle removal, going-concern→remediated arc, RCGT→KPMG change, Microsoft $9.7bn / NVIDIA $3.4bn contract values + NVIDIA 30M $70 rights, Mirantis ~$625M-stock / Nostrum ~EUR165M deal terms, 97% mining-pool revenue concentration.
- **Medium / derived (◆):** founder ~2.3% economic stake, Nostrum USD conversion, segment margin concern.
- **Low / 待查:** per-customer AI revenue %, PPA/goodwill on pending deals, exact founder sell sizes, 43.5%-vs-35.4% voting reconciliation, restatement $ magnitude.
