<script type="text/markdown" id="md"># IREN Limited — 07 Related Parties (Red-Flag Scan)

> Agent C deliverable. Sources: 10-Q (Mar 31 2026), 10-K FY2025, DEF 14A (Oct 6 2025), Form 3/4/144.
> Legend: ★ primary · ◆ derived · ◇ secondary · ▽ estimate.

---

## 0. Governance / control structure
- **Co-Founders & Co-CEOs: Daniel Roberts and William Roberts (brothers).** ★ DEF 14A / 10-K
- **Dual-class:** Ordinary shares (1 vote) + **B Class shares = 15 votes each**; only **2 B Class shares** outstanding (one held by each Roberts). ★ 10-K Risk Factors
- Combined Roberts voting power: **43.5%** of total (each ~21.8%) as of Aug 31 2025 — *practical control, blocking minority, not majority.* ★ DEF 14A ownership table. (10-K Risk Factor states 35.4% as of Aug 15 2025 — figure rises with B-class leverage / option inclusion.)
- B Class shares auto-redeem on founder retirement, breach, liquidation, or **Nov 17, 2033** (12-yr sunset). ★
- Chair is **independent** (David Bartholomew). No standing nominating committee (relies on independent directors). ★

---

## 1. Related-party transactions — disclosure status
- **10-Q (Mar 31 2026): NO related-party transactions note / zero hits.** ★ (clean)
- **10-K FY2025 Item 13:** related-party transactions **incorporated by reference into the DEF 14A** ("Related Party Transactions" caption). ★
- **DEF 14A:** describes a **Related Party Transactions Policy** (Audit & Risk Committee approval; arm's-length test; Australian-law shareholder approval for certain RPTs) but **discloses no specific material related-party transactions** for FY2025. ★ → **No founder self-dealing, no related loans, no founder-owned supplier disclosed.** This is a *positive* signal.

---

## 2. NVIDIA dual role ⚠️ (KEY red-flag to monitor)
NVIDIA Corporation is simultaneously:
1. **Customer / counterparty** — the **$3.4B** managed-services AI cloud contract (5-yr, Childress TX). ★ 10-Q subsequent events
2. **Hardware supplier** — GPUs (GB300) flow through Dell but are NVIDIA silicon; NVIDIA controls allocation.
3. **Prospective ~6–8% shareholder** — **investment right to buy 30,000,000 ordinary shares @ $70** (up to $2.1B), vesting on delivery of **up to 600,000 NVIDIA GPUs**, expiring May 7 2031. ★ 10-Q Note 17

**Why this matters:** NVIDIA's investment right **vests on GPU delivery volumes** — i.e., NVIDIA earns equity by selling IREN more chips and IREN buying/deploying them. This aligns NVIDIA's equity upside with IREN's procurement spend, a **circular financing dynamic** (vendor takes equity tied to its own product throughput, similar to NVIDIA's stakes in CoreWeave/Nebius/other neoclouds). Once exercised, NVIDIA becomes a related party with potential influence over a company that is also its customer and its capacity outlet. **Not currently an SEC related-party (not yet a holder), but flag for next 10-K.**

---

## 3. Insider transactions (Form 4 / 144) — founder selling pattern ⚠️
Cluster of disposals by Co-CEOs around Sep 2025 (★ filings index `data/processed/IREN_filings.csv`):
- 2025-09-03/09-05: Form 4 D. Roberts & W. Roberts.
- 2025-09-11: Form 4 D. Roberts & W. Roberts **+ paired Form 144** (notice of proposed sale) for each.
- 2025-07-01/07-03: Form 3 + Form 4 cluster (founders + officers Nucifora, Alfred, Parasuraman, Guzowski, Bartholomew) — tied to **July 1 2025 US domestication / officer re-designation** (administrative, not open-market sells).
- 2025-09-08: Form 3 for Anthony Lewis (new CFO, replacing Nucifora).

**Read:** July cluster = mechanical (redomicile to domestic filer). **September Form 4 + 144 pairs = genuine founder open-market selling** while the stock was high and ahead of the Microsoft/converts catalysts. Founders each hold only ~6.25M ordinary shares (2.3%), so sells are modest in % terms but worth tracking for 10b5-1 plan disclosure. (XSL-rendered Form 4s did not expose machine-readable share/price tags; transaction sizes待查 — pull raw `.xml` primary_doc if precise amounts needed.)

---

## 4. Other related-party-adjacent items
- **Loan-funded shares:** 521,206 restricted ordinary shares issued to management + certain **non-employee founders of PodTech Innovation Inc** under Employee Share Plans (treated as options for accounting). ★ 10-Q Note 17. Small, legacy.
- **Bitmain** supplemental agreement (Jun 2025) for mining-hardware payments + a Bitcoin purchase option (expired nil) — supplier, not related party. ★
- **Nostrum Group acquisition** (~EUR 165M, 65% cash / 35% IREN shares) — M&A, shares issued under 4(a)(2). ★ 10-Q. Not related-party.

---

## 5. Verdict — related-party red flags
| Item | Severity | Note |
|---|---|---|
| No disclosed founder self-dealing / related loans | ✅ clean | DEF 14A discloses policy only, no transactions |
| Brother Co-CEOs + dual-class (15× B shares) | 🟡 governance | 43.5% combined voting power; entrenched control, sunset 2033 |
| **NVIDIA = customer + supplier + future shareholder** | 🟠 **monitor** | Equity right vests on GPU purchase volume = circular vendor financing; becomes RPT once exercised |
| Founder Sep-2025 Form 4 + 144 sells | 🟡 monitor | Confirm 10b5-1; sizes待查 from raw XML |
| Negative APIC / aggressive equity engineering | 🟡 | Not RPT but shareholder-dilutive (see file 13) |

**Bottom line:** Conventional related-party hygiene is clean (no insider loans or affiliate supplier contracts disclosed). The real related-party *theme* is the **NVIDIA triple role** and the **dual-class founder control**, neither of which is an SEC-reportable RPT today but both materially shape incentive alignment.
