<script type="text/markdown" id="md"># IREN Limited — Governance, Control & Acquisitions

**Tier:** ★ SEC direct · ◆ derived · ◇ press · ▽ external.
Primary sources: [DEF 14A 2025-10-06](https://www.sec.gov/Archives/edgar/data/1878848/000114036125037383/ny20053824x2_def14a.htm), [10-K FY2025](https://www.sec.gov/Archives/edgar/data/1878848/000162828024038677/iren-20240630.htm), [10-Q Q3 FY26](https://www.sec.gov/Archives/edgar/data/1878848/000187884826000030/iren-20260519.htm).

---

## 1. Founder control — the dual-class engine

- **Founders:** brothers **Daniel Roberts** & **William ("Will") Roberts**, Co-Founders & Co-CEOs & directors. Both ex-Macquarie (Will co-founded Macquarie's Digital Assets team); founded the company Nov 2018. ★ DEF 14A bios (lines 421, 423)
- **Dual-class structure:** Ordinary shares = 1 vote; **B Class shares = 15 votes each**. Only **2 B Class shares outstanding**, one held by each brother's trust — **Awassi Capital Holdings 1 Pty Ltd** (Will) and **Awassi Capital Holdings 2 Pty Ltd** (Daniel). ★ DEF 14A lines 2459/2470/2474
- **Combined voting power: 43.5%** as of Aug 31, 2025 (DEF 14A beneficial-ownership table). ★ line 2459
  - ⚠️ **Reconciliation note:** the FY2025 10-K Item 1A states the founders hold **35.4%** of voting power "as of August 15, 2025" (line 2996). The DEF 14A's **43.5%** (Aug 31, 2025) likely includes vested-within-60-days options/RSUs and the full B-share leverage. Treat **43.5%** as the proxy-table figure and **35.4%** as the 10-K narrative figure; the gap (≈8pp, two-week apart) is **待查** — most plausibly differing inclusion of exercisable options/RSUs. Both confirm founders can practically control shareholder votes via the 15× B-shares.
- Each brother's economic stake is modest: ~5,509,268 Ordinary + 741,979 vested RSUs + 1 B-share each → ~**2.3% economic each** (per Agent E/07 sibling). Control is via votes, not economics. ◆
- **B-share sunset / redemption** — B Class shares redeemed on the earliest of: (i) the associated founder ceases to be a director via voluntary retirement; (ii) unremedied breach-transfer; (iii) liquidation; or **(iv) November 17, 2033** (12 years post-listing). ★ DEF 14A line 2387 / 10-K line 2996

---

## 2. Board & committees

- **Board = 6 directors:** 2 **Founder Directors** (the Roberts brothers, designated by the B-shareholders) + **4 Non-Founder Directors**. ★ DEF 14A line 2576
- **Independent directors named:** Sunita Parasuraman (Audit & Risk Chair), David Bartholomew, Christopher Guzowski, Michael Alfred. **Audit & Risk Committee = all four**; held 6 meetings in FY2025; has sole authority over auditor engagement. ★ line 466
- **Director election regime (changing):** Currently directors had **no requirement to stand for shareholder election**. DEF 14A Proposal 2 ("Director Election Amendment") introduces shareholder election of **Non-Founder Directors only**, under a **classified (3-class) board** starting AGM 2026, sunsetting from AGM 2030 (declassified by AGM 2032). **Founder Directors remain B-share-designated and are NOT subject to shareholder election.** ★ lines 2538–2576

---

## 3. "Controlled-company"-type exemptions & filer status

- IREN **lost "foreign private issuer" status** and now files as a **US domestic filer** (10-K/10-Q/8-K/DEF 14A, vs former 20-F/6-K). Consequently now subject to US proxy-solicitation rules, **universal proxy (Rule 14a-19)**, and **Nasdaq Rule 5620(c)** 33⅓% quorum (Constitution amended via "Quorum Amendment"). ★ DEF 14A lines 2517/2643
- The dual-class + founder-designated-director structure is functionally a **controlled-company arrangement** governed by the **Australian Constitution + Corporations Act**, not Delaware. Shareholder rights differ from US norms; classified board + B-share veto entrench the founders. ★ 10-K "Risks Related to Being Incorporated Outside the United States."
- Note: DEF 14A does **not** explicitly invoke Nasdaq "controlled company" Rule 5615(c) exemptions by name — IREN runs an independent-majority Audit & Risk Committee. The control is constitutional (B-shares), not via Nasdaq exemption. ◆

---

## 4. Executive compensation — FY2025

- **Each Co-CEO total comp = $72,647,744** (FY2025 Summary Compensation Table). ★ DEF 14A lines 1104/1124/2078
- **CEO pay ratio = 993 : 1** (median employee FY2025 comp = $73,186). ★ line 1919
- **Heavily equity / at-risk:** **93% of each Co-CEO's target total comp is "at-risk"/variable** (cash bonus + time- and performance-based equity). (CFO Belinda Nucifora: 66% at-risk.) ★ lines 526/593 — consistent with brief's "~96% equity" framing (equity dominates the $72.6M).
- **PRSU modification red flag:** 2025 Annual PRSUs to each Co-CEO were originally tied to **share-price hurdles ($20→$50)**, but **modified in May 2025 to vest purely on continued employment** (50% on Nov 18, 2025; 50% on May 18, 2026) — i.e. **performance hurdles were removed**, converting at-risk PRSUs into near time-vesting awards. ★ lines 1375/1835
- Equity typically vests over 3 years (some 6-yr Retention Grants). ★ line 601

---

## 5. Acquisitions — Mirantis & Nostrum (H8)

| | **Mirantis, Inc.** | **Ingenostrum, S.L. (Nostrum Group)** |
|---|---|---|
| **What** | US-based cloud software / orchestration & services provider (Kubernetes/cloud software — adds orchestration to AI Cloud stack) | Spanish data-center developer (490MW power capacity in Spain + global dev pipeline; adds development/engineering/construction/ops capability) |
| **Signed** | **May 4, 2026** (Agreement & Plan of Merger; Kube Merger Sub Inc.) | **May 7, 2026** (Sale & Purchase Agreement) |
| **Stake** | **100%** (reverse-triangular merger; Mirantis becomes wholly-owned) | **100%** |
| **Consideration** | **~$625M**, **all stock**: **13,673,894 Ordinary shares** (priced off $45.66 = May 1, 2026 close); ~10% paid in **cash** to unaccredited holders. Vested Mirantis options roll into RSUs/shares; unvested forfeited. | **~EUR 165M** (~$180M ◆ @≈1.09), subject to adjustment; **~65% cash / ~35% IREN Ordinary shares**; customary post-closing adjustment. |
| **Closing conditions** | Mirantis stockholder vote; **HSR antitrust** clearance + other regulatory; no MAE; reps/warranties; outside date **Aug 3, 2026**. | Customary closing conditions. |
| **Share issuance basis** | Section 4(a)(2) private-placement exemption; IREN to file resale registration statement. | Section 4(a)(2) exemption. |
| **Goodwill / PPA** | **Not yet finalized** — "initial accounting for the acquisitions not yet finalized… has not finalized allocation of purchase price… goodwill and acquired intangibles" to be disclosed in a later filing. | Same — PPA pending. |

- **Goodwill already on the books is tiny:** Q3 FY26 balance sheet shows only **$1.2M goodwill** from a *separate small* business combination (price payable $1.2M, "not material") — **NOT** the Mirantis/Nostrum goodwill, which is unrecorded pending close. ★ 10-Q line 4747/4728
- **Integration & execution risk (H8):** Both deals are *pending* (signed May 2026, not closed). 10-Q risk language flags "unanticipated costs or liabilities," ability to obtain regulatory approvals, satisfy closing conditions, and "successfully integrate and achieve anticipated benefits." Mirantis is mostly **stock-funded (dilutive)**; Nostrum is **majority-cash (liquidity draw)** and adds a **first European footprint** (new jurisdiction = new regulatory/integration surface). ★ 10-Q lines 1776/1778

---

## 6. Governance red flags (ranked)

1. **Entrenched founder control via 15× B-shares (43.5% votes), un-electable Founder Directors, classified board** — minority shareholders cannot change control of the board until ≥2032 and cannot remove the founders' designees at all (B-share right runs to Nov 17, 2033). ★
2. **PRSU performance hurdles removed mid-year (May 2025)** — $20–$50 share-price gates swapped for plain time-vesting on $72.6M-each packages; weakens pay-for-performance. ★
3. **Recent control-quality cluster:** FY2024 going-concern + ICFR material weakness (remediated 6/30/25) + 20-F/A cash-flow restatement (Mar 2025) + auditor change RCGT→KPMG (Nov 2025). ★
4. **NVIDIA conflict of interest:** future ~10%-by-warrant shareholder is simultaneously top customer and sole-source GPU supplier (see 03_customers.md). ★
5. **Founder open-market selling, Sept 2025** (Form 4 + Rule 144) while stock elevated and ahead of Microsoft/converts catalysts — per sibling 07_related_parties; **10b5-1 plan confirmation + exact sizes 待查 (raw Form 4 XML).** ▽/★
6. **993:1 CEO pay ratio.** ★

**Verdict — H8 (acquisitions):** Both deals are real, signed, and disclosed with terms; Mirantis ≈$625M all-stock (dilutive), Nostrum ≈EUR165M (65% cash). **Consolidation, goodwill and PPA are explicitly NOT yet recorded** (only an unrelated $1.2M goodwill exists) — so goodwill/impairment and integration outcomes are **prospective unknowns (待查)**, and integration/regulatory/closing risk is live (HSR; Aug 3, 2026 outside date for Mirantis).
