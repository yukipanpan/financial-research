> Industry horizontal benchmark. Core purpose: any spend/metric far above peers must answer "reasonable + necessary?"

## 10.1 Peer-pool construction

### Selection criteria
1. Business-model similarity ≥ 70% (BTC mining and/or AI-GPU-cloud / HPC data centers)
2. Revenue scale 0.3×–3× of IREN (IREN FY25 = $501.0m) — relaxed: neoclouds skew larger, miners smaller
3. Same capital market (all US-listed: NASDAQ/NYSE) — valuation-multiple systems comparable
4. Public data available (SEC EDGAR filers, all confirmed below)

### Two-bucket pool (segment-specific, since IREN is a hybrid)

IREN sits at the **intersection** of two pools. Both must be benchmarked:

**Bucket A — Neocloud / AI-GPU-cloud pure-plays** (IREN's destination)

| Nebius Group | NBIS | 1513845 | 70% | $529.8m ★ | Closest revenue scale ($530m ≈ IREN $501m); full-stack AI cloud + own DCs; same growth-stage losses |

**Pure-miner contrast (not benchmarked in detail, for context only)**: Riot (RIOT), MARA — kept BTC-mining-centric, minimal AI pivot. Used only to show the "did NOT pivot" end of the curve.

**Why these and not pure SaaS / hyperscalers**: IREN is capital-intensive, power-anchored, single-asset-class (GPU/ASIC) infrastructure. Comparing it to Microsoft/Google margins would be apples-to-oranges (Trap #1). The right comps are other power+silicon infra builders at growth stage with heavy capex and thin/negative margins.

## 10.3 Reasonableness of standout items (CORE)

### (a) Capex & contracted-backlog vs recognized-revenue gap

```
Item: Capex + contracted backlog vs recognized revenue
IREN: Capex ~$1.1bn = ~2.2× FY rev; backlog $13.1bn = 26× FY rev
Peer median: Capex/Rev ~2.2×; backlog/Rev ranges 6×(CRWV) → 76×(APLD)
Difference multiple: Capex IN-LINE (~median). Backlog/Rev HIGH but mid-pack vs transition peers.
```
**Judgment: Reasonable but front-loaded ⚠️.** IREN's Capex/Rev (~2.2×) is dead-on the peer median — it is NOT an outlier on spending intensity; this is simply what greenfield power+GPU infra costs. The *standout* is the **$13.1bn contracted backlog (MSFT $9.7bn + NVDA $3.4bn) against only $501m recognized FY revenue and just $33.6m quarterly AI-Cloud revenue**. That is a 26× backlog/revenue gap — large in absolute terms, but **lower than APLD (76×) and CORZ (31×)** and consistent with the bucket. The risk is identical to peers: backlog converts only as MW energize on schedule. Strategic necessity is clear (named hyperscaler/NVIDIA contracts, 5GW secured power). **Necessary; execution-timing is the live risk, not the spend level.**

### (b) Reliance on convertible-note financing vs peers

```
Item: Convertible-note financing dependence
IREN: ~$6.75bn total converts ★ = essentially ALL of its debt stack; vs $2.21bn cash
Peer financing mix: CRWV $17.3bn LT debt (DDTL/term + GPU-backed) ; NBIS $4.1bn (mixed); 
  CORZ $1.06bn (notes+converts); WULF/CIFR ~$4.4bn (converts heavy); HUT ~$0.25bn (light)
```
**Judgment: HIGHEST convert-reliance in the pool ⚠️⚠️ — distinctive risk.** IREN funds its entire build almost exclusively through **convertible notes (~$6.75bn)**, far more convert-concentrated than peers. CRWV uses asset-backed / delayed-draw term loans tied to specific GPU contracts (debt secured by contracted cash flows); NBIS and HUT are far less levered. WULF/CIFR also lean on converts but at ~$4.4bn on smaller asset bases. **IREN's structure means equity-dilution overhang (converts strike into shares) and refinancing/coupon-step risk are its single biggest financing differentiator.** This is the one metric where IREN is a clear negative outlier. Necessary given no contracted-debt track record yet, but raises financing-risk rank.

### (c) Position on the mining → AI transition curve

```
Further along than IREN:  CORZ (CoreWeave 590MW HPC deal live, being acquired by CRWV) 
                          APLD (already ~100% AI/HPC lease model, mining largely exited)
Roughly alongside IREN:   WULF, CIFR (Fluidstack/AWS/Google deals signed, MW energizing 2026)
Behind IREN:              HUT (more diversified/mining-anchored), RIOT/MARA (barely pivoting)
Pure destination state:   CRWV, NBIS (born/rebuilt as AI cloud, no mining)
```
**Judgment:** IREN is **mid-to-late stage** in the transition — ahead of HUT and pure miners, roughly level with WULF/CIFR, and behind CORZ/APLD on *contract conversion*, but **ahead of all miners on contract quality** (Microsoft + NVIDIA direct vs peers' neocloud-intermediary deals like Fluidstack/CoreWeave-as-tenant). IREN's AI-Cloud is still only ~23% of revenue (Q3 $33.6m/$144.8m), so recognized-revenue mix lags its backlog prestige.

## 10.7 Summary — industry-compare picture

```
1. IREN's financial standing in the pool:  MIDDLE on scale, UPPER on backlog quality, 
   WEAKEST on financing structure.
2. Biggest financial strength:  Best-in-class contracted backlog ($13.1bn from Microsoft + 
   NVIDIA directly) + 5GW secured power + $2.21bn cash — strongest "named-counterparty" 
   pipeline of any transitioning miner.
3. Biggest financial weakness:  ~$6.75bn convertible-note stack = highest convert-dependence 
   in the pool → dilution + refinancing overhang.
4. Biggest accounting difference vs peers:  Hybrid mining(spot)/AI(contracted) revenue 
   recognition; AI-Cloud only ~23% of revenue despite dominating backlog. NBIS net-income is 
   distorted by one-off gains (exclude). Capex/Rev (~2.2×) is exactly median — NOT an outlier.
5. Valuation vs peers:  待查 — market cap / EV / EV-Revenue multiples not in SEC filings; 
   pull from third-party (e.g. https://stockanalysis.com/stocks/IREN/, peers likewise) before 
   finalizing 10.4 valuation table. Do NOT fabricate.
```

### Where IREN ranks (the verdict)

| Axis | IREN rank in pool | Basis |
|---|---|---|
| **Valuation** | 待查 | Needs third-party EV/Rev, EV/EBITDA — not fabricated here |
| **Execution** | Upper-middle | Best backlog quality (MSFT+NVDA); but AI revenue conversion (23%) still trails APLD/CORZ; on-track with WULF/CIFR |
| **Financing risk** | Highest / worst | ~$6.75bn converts, all-convert structure, $4.54bn net debt vs negative-EBITDA-trajectory; only WULF/CIFR comparable, CRWV uses contracted-cashflow-backed debt instead |

**One-line**: IREN is a mid-to-late-stage miner→AI converter with the *best contracted backlog* (blue-chip counterparties, 5GW power) but the *most aggressive convertible-financing structure* in its peer set — execution-credible, financing-fragile.
