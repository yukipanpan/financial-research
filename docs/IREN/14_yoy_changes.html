## 14.1 会计准则 / 政策变更

| 财年 | 变更内容 | 准则编号 | 采纳方式 | 影响科目 | 影响金额 | 来源 |
|---|---|---|---|---|---:|---|
| **FY2024** | **挖矿硬件 S19j Pro 寿命 4 年→2 年**（会计估计变更）| ASC 360 / IAS 16 | **未来适用（prospective）** | 折旧、PP&E、净亏损 | 折旧↑（加速；具体额待查）| ★ 10-K Note 12 |
| **FY2025** | **整体 IFRS → US GAAP 转换**（域内申报人）| 框架切换 | 追溯（重述比较期为 US GAAP）| 全表 | 多处重分类（金额待 Agent A 逐行核）| ★ 10-K FY25 |
| **FY2025** | **采纳 ASU 2023-08 / ASC 350-60（加密资产公允价值）** | ASU 2023-08 / ASC 350-60 | 采纳（US GAAP 下 BTC 按公允价值，变动入损益；现金流按持有期分类）| 数字资产、其他收益、留存收益 | 待查（FY25 期末 BTC 持有量小，日内清算）| ★ 10-K FY25 |

**对每条变更的 3 问**：
```
S19j Pro 寿命：prospective → FY24 起折旧出现断层，加速折旧压低当期；让利润「变难看」（保守）。
IFRS→US GAAP：FY25 比较期已按 US GAAP 重述 → FY25 vs FY24(US GAAP) 可比；但 FY25 10-K 数字 ≠ 原 20-F IFRS 数字，跨框架对比须标注 ⚠️。
ASC 350-60：US GAAP 下 BTC 公允价值变动入损益（IFRS 下为无形资产成本模式），未来 BTC 持仓若放大会引入损益波动；目前日内清算故影响小。
```

## 14.2 业务分类 / 分部重分类（含 H3 重述）★★★

### 报告分部口径
| 财年 | 报告分部 | 变化 | 历史是否 restated | 来源 |
|---|---|---|---|---|
| FY2023 | 单一报告分部（Bitcoin mining 为主）| 基准 | — | ★ |
| FY2024 | Bitcoin Mining + 新增 AI Cloud Services（2024 上线）| 新增 AI Cloud 业务线 | — | ★ |
| FY2025 | Bitcoin Mining / AI Cloud Services（US GAAP 口径）| 维持 | 比较期按 US GAAP 重述 | ★ 10-K |

> 地理收入归属（★ SEC 评论 #6）：原披露按"服务提供地"（北美），SEC 要求改为按"集团内签约实体所在地"（澳大利亚母公司，100% 挖矿收入归母）——披露口径修订，不改总额。

### ★★ H3 — 财务重述（THE RESTATEMENT）

**性质**：纯**现金流量表分类重述**（reclassification），**非差错性数字更正**，**不动**损益表、资产负债表、权益变动表、期末现金。

| 项目 | 内容 | 来源 |
|---|---|---|
| **重述了什么** | 将"出售已挖 Bitcoin 的收款（proceeds from sales of Bitcoin mined）"从 **经营活动现金流** 重分类为 **投资活动现金流** | ★ 6-K 2025-03-20 |
| **为什么** | SEC（Division of Corporation Finance, **Office of Crypto Assets**, Mark Brunhofer/Michelle Miller）认定：IREN 主营是"向矿池提供 hash 计算服务、换取非现金对价无形资产 Bitcoin"，**后续出售该无形资产属投资活动**，符合 **IAS 7.16(b)**（出售无形资产的现金流入=投资活动）| ★ UPLOAD 2025-02-20 |
| **重述哪些期间** | FY2024、FY2023、FY2022（年报）+ 2024-09-30、2024-12-31（中期）| ★ 6-K |
| **影响科目** | 仅现金流量表：经营活动净现金流 ↓、投资活动净现金流 ↑（金额相等抵消）| ★ |
| **对损益/BS/权益/期末现金的影响** | **零**（"does not impact ... statements of profit or loss ..., financial position, ... changes in equity, or cash and cash equivalents at the end"）| ★ 6-K 原文 |
| **量级方向** | 等于各期 BTC 挖矿收款全额（FY24 挖矿收款重大、占经营现金流大头）→ 重述后**经营现金流由正转负/大幅缩水**。例：CORRESP 披露 2024-09-30 季度经营现金流原为 −$3.8m；BTC 收款一旦移出，经营现金流进一步恶化。**精确重述前后金额：见 20-F/A，待 Agent A 逐期填表** | ★/待查 |

**博弈时间线**（3 轮评论）：
```
2024-11-19  SEC 第 1 轮评论函（prior comment 4）：质疑 BTC 收款为何放经营活动；点名 IAS 7.16(b)。★ UPLOAD
2024-12-18  公司第 1 轮回复：抗辩——援引 IAS 7.14/7.15（经营=主营收入活动）、IAS 7.6，主张 BTC 是
            「整个经营循环不可分割部分、日内 <4h 即变现、类似卖货」，坚持经营活动分类。★ CORRESP
2025-02-20  SEC 第 2 轮评论函：不接受抗辩，明确「the subsequent sale of that bitcoin is an investing
            activity consistent with IAS 7.16(b). Please revise your financial statements accordingly.」★ UPLOAD
2025-03-20  公司第 2 轮回复：投降，承诺在 20-F/A 重分类为投资活动；同日董事会(经审计与风险委员会建议)
            结论历史报表应重述，并发 6-K 重述通知 + 6-K/A + 20-F/A。★ CORRESP + 6-K
```

### 科目重分类（不改历史可比性的「真重述」）
| 财年 | 从 | 到 | 金额 | 影响比率 | 来源 |
|---|---|---|---:|---|---|
| FY22/23/24 + 2 个中期 | 经营活动现金流（BTC 收款）| → 投资活动现金流 | = 各期 BTC 挖矿收款全额（待精确填）| 经营现金流被大幅下修；OCF/收入、自由现金流口径变差 | ★ 20-F/A |

**关键问答**：
```
☑ 重分类后历史期同步调整 → 是（全 Restatement Periods 同步重述）→ 真 YoY 可比（同口径内）。
☑ 是否掩盖经营恶化 → 反向：重述让经营现金流「变难看」，是 SEC 强制、非公司主动美化。
⚠️ 但跨"重述前 vs 重述后"看历史经营现金流必失真：必须用重述后口径。
⚠️ 损益/净亏损完全不受此重述影响——别误把"经营现金流变差"当成经营恶化。
```

## H3 / H4 结论

**H3（重述）— 证实**：确有 2025-03-20 同日 6-K 重述通知 + 6-K/A + 20-F/A，源于 SEC Office of Crypto Assets 3 轮评论。**重述实质 = 现金流量表分类**（BTC 销售收款 经营→投资，IAS 7.16(b)），**不影响损益/BS/权益/期末现金**；量级=各期 BTC 收款全额，使历史经营现金流大幅下修。公司先抗辩（IAS 7.14/7.15）后投降。**不是利润/资产造假级重述，但伴随 FY24 going concern 段落 + ICFR 重大缺陷**。

**H4（Adj EBITDA）— 证实**：FY2026 起 Adj EBITDA 定义剔除 debt conversion inducement expense（Q2 FY26 该项 $111.8m），公司称对前期无影响。

### H4 — Adjusted EBITDA Reconciliation（★ 8-K Q3FY26 p.17，US$m）

| 行项 | Q3 FY26 (2026-03-31) | Q2 FY26 (2025-12-31) | 说明 |
|---|---:|---:|---|
| Net income (loss) | (247.8) | (155.4) | GAAP 起点 |
| − Income tax (expense) benefit | (6.3) | (182.5) | 加回 |
| = Income (loss) before tax | (254.1) | (337.9) | |
| + Finance expense | 14.8 | 10.7 | |
| − Interest income | (21.8) | (15.8) | |
| + Depreciation & amortization | 121.2 | 99.2 | |
| + Unrealized (gain) loss on financial instruments | 23.7 | 107.4 | 含 capped call 公允价值损失 |
| + Stock-based compensation | 31.5 | 58.2 | |
| + Impairment of assets | 140.4 | 31.8 | Q3 退役矿机减值 |
| + (Gain) loss on disposal of PP&E | (0.2) | (0.0) | |
| + (Incr) decr in FV of assets held for sale | 2.0 | 6.4 | |
| + **Debt conversion inducement expense** | **—** | **111.8** | ⚠️ **FY26 新加回项（定义变更）** |

| **= Adjusted EBITDA** | **59.5** | **75.3** | |

**重定义影响判读**：debt conversion inducement expense 是诱导可转债持有人提前转股付出的一次性、非现金（或准非现金）代价（Q2 FY26 $111.8m，对应 2030 可转债部分诱导转换）。剔出后：
- Q2 FY26 Adj EBITDA 因此项加回从原口径抬升（若不加回会更低）→ 该重定义**对 FY26 表观 Adj EBITDA 有美化作用**，但属合理的"一次性/非经营"剔除，非激进操纵。
- 公司声称对 prior periods（FY25 及前）Adj EBITDA「无影响」，因前期无此费用入账——**跨年 Adj EBITDA 仍可比，但须知 FY26 口径多剔一项**。
- 其他常规非 GAAP 调整（ARR、Adjusted EBITDA margin）口径未变。ARR/SoSoValue 类运营指标由 Agent 另档。
