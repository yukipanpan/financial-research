<script type="text/markdown" id="md"># IREN Limited — Corporate DNA & Timeline

**Source-tier legend:** ★ SEC direct disclosure · ◆ derived from SEC · ◇ company press/IR · ▽ third-party/estimate
**Unit rule:** 1亿USD = $100M = $0.1B. All figures in full units.

---

## 1. Identity

- **Legal name:** IREN Limited (formerly "Iris Energy Limited"; previously "Iris Energy Pty Ltd"). Commenced doing business as "IREN" on **Feb 15, 2024**. ★ [20-F FY2024, line 3307](https://www.sec.gov/Archives/edgar/data/1878848/000162828024038677/iren-20240630.htm)
- **Ticker / exchange:** IREN on Nasdaq Global Select Market. CIK 0001878848. Commission File 001-41072. ★
- **Jurisdiction:** Incorporated & domiciled in **Australia** (New South Wales). Principal office: Level 6, 55 Market Street, Sydney NSW 2000 (was Level 12, 44 Market Street). ★
- **Fiscal year end:** June 30.
- **Presentation currency:** USD. Functional currency of parent and certain subs = AUD. ★
- **Business model today:** Vertically integrated owner/operator of 100%-renewable-powered data centers running (a) Bitcoin-mining ASICs and (b) NVIDIA GPUs for HPC/AI Cloud Services. Pivoting toward AI. ★ [10-K FY2025, Item 1](https://www.sec.gov/Archives/edgar/data/1878848/000162828024038677/iren-20240630.htm)

---

## 3. Corporate Structure

- **Parent:** IREN Limited (Australia). Consolidated financials cover IREN Limited + controlled entities; prepared under **US GAAP** (also files an Australian statutory auditor's report under Corporations Act §317). ★
- **Filer status:** **No longer a "foreign private issuer"** under SEC/Nasdaq rules. Transitioned from 20-F/6-K to **domestic 10-K/10-Q/8-K/DEF 14A** filer (mechanical redomicile of reporting in mid-2025). Now subject to proxy-solicitation and universal-proxy rules, and Nasdaq Rule 5620(c) 33⅓% quorum. ★ [DEF 14A, lines 2517/2643](https://www.sec.gov/Archives/edgar/data/1878848/000114036125037383/ny20053824x2_def14a.htm)
- **Named US operating subs:** IE US Hardware 3 Inc. (Microsoft contract counterparty); Kube Merger Sub Inc. (Delaware, for Mirantis merger). ★
- **Pending subsidiaries:** Mirantis, Inc. (US, software); Ingenostrum, S.L. / Nostrum Group (Spain, data-center developer). ★
- **Two share classes:** Ordinary shares (1 vote) + **B Class shares (15 votes each)**, only **2 B-shares outstanding**, held by Awassi Capital Holdings 1 & 2 (Roberts brothers' trusts). ★

---

## 4. What the DNA tells you

IREN is a **founder-controlled Australian energy-infrastructure company that became a Bitcoin miner (2019) and is now reinventing itself as an AI/GPU data-center landlord** (2024→). The corporate identity is built around **owning power + land + buildings** (freehold, grid-connected, 100% renewable via clean energy or RECs) rather than leasing — management explicitly frames ownership as a durability advantage. The pivot is recent, capital-hungry, and customer-concentrated, layered on a company that as recently as FY2024 carried a going-concern paragraph and a material weakness.
