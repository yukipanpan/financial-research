<script type="text/markdown" id="md"># 02_business_map.md — IREN Limited 业务地图

> CIK 0001878848 · NASDAQ: IREN · FY ends June 30
> 来源：FY2025 10-K + 10-Q Q1/Q2/Q3 FY26 + 8-K Q3FY26 earnings release（本地 raw/）

## 两个 reportable segments（公司官方口径）★

```
IREN Limited
├── 业务一：Bitcoin Mining（比特币挖矿）          ← 现金牛，但收入正在崩塌（退潮中）
│     · 自营 ASIC 矿机，垂直整合：自建电力 + 数据中心
│     · 主力站点：Childress (TX), Canal Flats / Prince George / MacKenzie (BC, Canada)
│     · FY25 收入 $484.6M（占总收入 96.7%）★
│     · Q3FY26 收入已降至 $111.2M（环比 −33.6%）★
│
└── 业务二：AI Cloud Services（GPU 云 / HPC）      ← 增长引擎，但绝对规模仍极小
      · NVIDIA GPU 集群对外出租（GPUaaS），液冷数据中心
      · 关键合同：微软 $9.7bn（19个月起、5年期，截至3/31/26 已交付 tranche=NIL）、
        NVIDIA $3.4bn（5年、Blackwell）、Prince George GPU 部署
      · FY25 收入 $16.4M（占总收入 3.3%）★
      · Q3FY26 收入 $33.6M（环比 +94.4%，但只占总收入 23.2%）★
```

## 收入占比演变（转型可视化，$M）★

| 期间 | Mining | AI Cloud | AI Cloud 占比 | 总收入 |
|---|---:|---:|---:|---:|
| FY2023 | 75.5 | 0.0 | 0.0% | 75.5 |
| FY2024 | 184.1 | 3.1 | 1.7% | 187.2 |
| FY2025 | 484.6 | 16.4 | 3.3% | 501.0 |
| Q1FY26 | 232.9 | 7.3 | 3.1% | 240.3 |
| Q2FY26 | 167.4 | 17.3 | 9.4% | 184.7 |
| Q3FY26 | 111.2 | 33.6 | **23.2%** | 144.8 |

**判断**：账面上 IREN 今天（Q3FY26）仍是 **77% 比特币挖矿公司**。AI Cloud 占比刚过 23%，且增长还赶不上挖矿收入下滑的速度 → 总收入连续两季环比下滑。管理层叙事（$9.7bn / $3.4bn / $3.1bn ARR）是对 **CY2026–2028 的预期**，与当期报表脱节约 1–2 个量级。

详细分段损益/成本/确认逻辑见 `02_business_segments_DEEP.md`。
