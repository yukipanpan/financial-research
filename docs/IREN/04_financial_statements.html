## 0. 一句话定调

IREN 是一家**比特币矿企正在转型为 AI Cloud（GPU 数据中心）服务商**的公司。
GAAP 现实（Q3 FY26，季度截至 2026-03-31）：总收入 **$144.8M ($0.145B)** ★、净亏损 **$(247.8)M** ★、Adj EBITDA **$59.5M** ★、其中非现金减值 **$(140.4)M** ★。
管理层对外讲的 $9.7bn 微软合同 / $3.4bn NVIDIA 合同 / $3.1bn ARR-under-contract 全部是**未来预期数**，与当期 GAAP 收入是两个量级（详见 H1，第 5 节）。

## 4. 三年趋势总结

```
收入：75.5M (FY23) → 187.2M (FY24) → 501.0M (FY25) → 9M FY26 已 569.8M  ← 比特币挖矿驱动的高增长
但季度环比已掉头：240.3 → 184.7 → 144.8 (Q1→Q2→Q3 FY26)   ← 挖矿收入崩 + 转型断档
净利：(171.8M) → (28.9M) → +86.9M → Q3FY26 单季 (247.8M)   ← GAAP 仍深亏，正数年靠非现金 unrealized gain
重资产化：PP&E 0.44B → 1.93B → 4.37B   ← 烧钱建 GPU/数据中心
融资填洞：9M FY26 融资净流入 $3.97B（可转债 $3.30B + 发股 $2.63B）  ← 极度依赖资本市场
```

## 5. H1 速答 — $3.1bn ARR vs $144.8M 实际季度收入

见 `02_business_segments_DEEP.md` 第 5 节与 `04b_cash_flow_DEEP.md`。核心：
- **RPO（已确认履约义务）= $710.3M ★**（仅此为有合同支撑的口径），其中未来 12 个月仅 $308.0M ★。
- **微软 $9.7bn 合同：截至 3/31/26 已交付并验收 tranche = NIL（零）★** → $0 计入 RPO，$0 确认收入。
- $3.1bn ARR-under-contract 是"未来预期年化收入"，公司自己注明"包含尚未产生收入的金额，直到相关 GPU 交付、调试并投入服务"★。**这是远期营销指标，不是 GAAP 收入。**
