> 应要求**逐份读取**自 2021 年 IPO 至 2026-05-31 的**全部 SEC filing（276 份已编目，无遗漏）**，每份给出内容摘要 + 链接。
> 数据来源：SEC EDGAR（CIK 0001878848）。单位 1亿=$100M=$0.1B。本清单为附录，材料级深读见各专题档案 01–17 与 REPORT。

## 第一部分 — 8-K 事件报告 + 定期报告（10-K / 10-Q / 20-F / ARS / 委托书）

# IREN Limited (CIK 0001878848) — SEC Filing Log: 8-K + Periodic Reports

子集范围：8-K, 10-K, 10-Q, 20-F, 20-F/A, ARS, DEF 14A, PRE 14A, DEFA14A。共 **37 份**（2022-09 至 2026-05），按时间倒序，无遗漏。
User-Agent: Yuki Pan yukipan0826@gmail.com。金额按披露原文。

## ⭐ 值得注意（最重大 / 意外）

- **2025-11-03｜微软 $9.7bn AI Cloud 合同（核心催化）**：与 Microsoft 签 5 年期 GPU 云服务合同（NVIDIA GB300），总额 ~$9.7bn 至 2031 年，含 20% 预付，部署在 Childress, TX（Horizon 1-4，200MW）。**首个超大规模客户落地**。
- **2025-11-03 / 2026-03-04 / 2026-05-26｜Dell 采购协议三连**：为履约微软合同向 Dell 采购 GPU——Nov 2025 ~$5.8bn；Mar 2026 Dell Canada ~$2.3bn + Dell USA（合计扩到 15 万 GPU）；May 2026 再签 ~$1.6bn（指向 $3.4bn managed services AI cloud 合同，Childress）。
- **可转债融资狂潮（稀释/杠杆信号）**：$550M(Jun25, 提及) → $1.0bn(Oct25, 0% coupon) → $2.3bn(Dec25, 0.25%/1.00%) → **$3.0bn(May26, 1.00%)**。FY26 至今披露 $9.2bn 融资 + Microsoft 预付 $1.9bn + $3.6bn GPU 融资(6% p.a.)。
- **2025-11-28｜审计师变更（Item 4.01）**：聘任 KPMG LLP 为独立审计师（无分歧/无保留）。
- **2025-03-20｜20-F/A 财报重述（红旗）**：应 SEC 评论函，将"出售已挖比特币的收入现金流"从经营活动重分类至投资活动，重述 FY22/23/24 现金流量表。
- **2025-07-01 → 09-08｜CFO 任命**：Anthony Lewis（前 Macquarie Co-Treasurer）7/1 任 Chief Capital Officer，9/8 升任 CFO。
- **GPU/产能交付节点**：Jun 2025 算力达 50EH/s、AI 云扩至 ~4.3k GPU；2026 年目标 15 万 GPU、$3.7bn ARR；新增 Oklahoma 1.6GW 园区（电力 2028 起爬坡，总锁定电力 4.5GW）。
