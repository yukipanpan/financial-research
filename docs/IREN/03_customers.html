<script type="text/markdown" id="md"># IREN Limited — Customers & Counterparty Concentration

**Tier legend:** ★ SEC direct · ◆ derived · ◇ company press · ▽ third-party
**Unit rule:** 1亿USD = $100M = $0.1B.

---

## 1. Two distinct revenue engines, two customer profiles

| Segment | "Customers" | Concentration | Nature |
|---|---|---|---|
| **Bitcoin Mining** (still majority of recognised revenue today) | **Mining-pool operators** (Antpool, Foundry) — not end-buyers | FY2025: **97% of revenue** via **3 mining pools**; FY2024 **98% via 3**; FY2023 **100% via 2**. ★ [10-K FY2025, "Concentrations" note](https://www.sec.gov/Archives/edgar/data/1878848/000162828024038677/iren-20240630.htm) | Pools pay BTC daily; terms terminable **at any time** by either side (Antpool User Service Agreement, Foundry Pool Terms). Company believes switchable "without material expense or delay". ★ |
| **AI Cloud / HPC Services** (the growth + future revenue) | A **small number of named hyperscaler-grade counterparties**: **Microsoft, NVIDIA**; plus "white-labelled compute with leading US AI cloud providers" and on-demand customers. ★ | **"Significant customer concentration"** explicitly disclosed; "a large portion of HPC/AI revenue from a small number of customers." ★ 10-K Item 1A (line 2808) | Contracts range on-demand to 3-year (legacy); new flagship contracts are 5-year. |

> **Exact % split between Microsoft vs NVIDIA vs other AI customers is NOT disclosed** in the FY2025 10-K (the giant contracts post-date the fiscal year). The 10-K only states the AI book is concentrated in "a small number of customers." Quantified per-customer % = **待查 / not disclosed**.

---

## 2. The anchor AI contracts (post-FY2025 subsequent events)

| Customer | Contract | Value | Term | Capacity / scope | Tier |
|---|---|---|---|---|---|
| **Microsoft** (via sub IE US Hardware 3 Inc.) | Partner Statement of Work, signed **Nov 2, 2025** | **~$9.7 billion** ($9,700M) | through **2031**, ~5-yr avg term | GB300 GPUs across **Horizon 1–4** at Childress, TX; **~200MW IT load**. 20% prepaid per tranche, credited after month 24. Drives ~$5.8bn GPU capex. | ★ [8-K 2025-11-03](https://www.sec.gov/Archives/edgar/data/1878848/000114036125040072/ef20058139_8k.htm) |
| **NVIDIA** (Cloud Services Agreement) | signed **May 7, 2026** | **~$3.4 billion** ($3,400M) | through **2032**, 5-yr term | Dedicated GPU services at Childress, TX, in **3 roughly-equal tranches** targeted for 2027. Customary termination + service credits + delivery-acceptance condition. | ★ [10-Q Q3 FY26, Note 22](https://www.sec.gov/Archives/edgar/data/1878848/000187884826000030/iren-20260519.htm) |

**Combined contracted AI book ≈ $13.1 billion** ($9,700M + $3,400M) concentrated in just **two counterparties**, both delivering at the **single Childress, Texas campus**. 10× sanity check: $9.7bn + $3.4bn = $13.1bn = ¥… 约 131亿USD — internally consistent.

---

## 3. The NVIDIA "triple-role" circularity ★

On **May 7, 2026** NVIDIA simultaneously became all three of the following to IREN:

1. **Customer** — buys $3.4bn of GPU cloud services (NVIDIA Cloud Services Agreement). ★ 10-Q Note 22
2. **Supplier** — NVIDIA is IREN's primary GPU vendor (the GPUs IREN deploys *for* NVIDIA, and for Microsoft, are NVIDIA chips; "current demand for NVIDIA GPUs far exceeds supply"). ★ 10-K Item 1A (line 2473)
3. **Future shareholder** — bought **investment rights to 30,000,000 Ordinary shares at $70.00** (up to ~$2.1bn gross), **vesting in tranches tied to delivery of up to 600,000 NVIDIA GPUs**, exercisable through **May 7, 2031**. ★ 10-Q Note 22

**Circularity read:** NVIDIA sells IREN the chips → IREN runs them as a service sold *back* to NVIDIA → NVIDIA's equity upside vests *only as IREN takes delivery of NVIDIA's own GPUs*. This aligns incentives but means a single counterparty drives IREN's supply cost, a chunk of its revenue, and its dilution/equity story at once. Revenue durability is therefore partly a function of NVIDIA's own strategic priorities, not arm's-length market demand. (Detailed $/legal terms = Agent C's H7 scope.)

---

## 4. Counterparty dependency map

- **Single-site concentration:** Both flagship AI contracts deliver at **Childress, TX**. Site-level outage, grid, tariff, or construction-delay risk hits both customers at once. ★
- **Customer credit quality:** 10-K warns many AI customers are "early stage and/or private companies… increased risk of insolvency." Microsoft & NVIDIA are investment-grade, but the *broader* AI customer base is not. ★ line 2808
- **Mining-side counterparties (low switching cost):** Pools Antpool/Foundry; BTC liquidation via **Kraken** (primary) → **Etana Custody** (fiat custodian) → bank; **Coinbase** onboarded as backup (not yet used as of 6/30/25). Company believes none is a substantial dependency. ★ Item 1
- **Equipment suppliers (high concentration):** "one supplier of mining hardware and four suppliers of HPC hardware" (FY2025 & FY2024). HPC/GPU vendors include **NVIDIA, Dell Technologies, Lenovo, Supermicro, WekaIO, Hunton Trane**. ★ Concentrations note + line 2173

---

## 5. Verdict — H7 (counterparty concentration / dependency)

**SUPPORTED.** The AI revenue model is structurally concentrated: two customers (Microsoft, NVIDIA) for the entire contracted backlog, one delivery campus, and a primary GPU supplier (NVIDIA) that is also a customer and a future ~10% shareholder-by-warrant. Mitigants: counterparties are top-tier credits, prepayment structures (Microsoft 20%/tranche) reduce upfront credit risk, and mining-side counterparties are genuinely low-switching-cost. The dependency that matters is **execution/delivery to two customers at one site**, plus the conflict-laden NVIDIA triple role. Per-customer revenue % is **待查/not yet disclosed** (contracts post-date FY2025).
