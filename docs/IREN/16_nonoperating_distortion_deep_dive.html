```

     【最大扰动】FY25 +$77.5m / 9M FY26 +$533.9m / Q3 FY26 单季 −$23.7m
   · Impairment of assets — 经营内、非现金、转型"经常性" — 9M FY26 −$188.4m（Q3 −$140.4m，矿机被 displaced）
