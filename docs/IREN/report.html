## 1. 公司一句话定义

> **IREN Limited 本质上是一个「把便宜的电力和土地，改造成 AI 算力的重资产二房东」**——它由比特币矿企转型为垂直整合的 AI Cloud（GPU 数据中心）provider，用比特币挖矿的现金流 + 持续举债/增发的资金，赌未来满租 Microsoft 与 NVIDIA。NASDAQ 上市，澳洲创立，财年截至 6 月 30 日。

- **单位铁律：1 亿 USD = $100M = $0.1B**。本文数字一律配全额货币单位（M 与 B 双写）。
- 常识锚：Microsoft FY24 营收 ~$245B、AWS ~$108B、NVIDIA FY24 ~$60.9B。IREN FY2025 营收 **$501.0m（= $0.5bn = 5.01 亿美元）** —— 量级合理（约为 NVIDIA 的 0.8%、CoreWeave 的 10%），无 10× 错位风险。

## 10. 关键会计政策（详见 `05_accounting_policies.md`）

- **收入确认（ASC 606 服务费，非 ASC 842 租金）**：Mining 按日 point-in-time；AI Cloud over-time，含大额预付。
- **折旧寿命表（★ 10-K FY25）**：建筑 20y｜厂房设备 3–10y｜**矿机 S19j Pro 2y（FY24 由 4y 下调）**｜其他矿机 4y｜**HPC/GPU 5y**。GPU 5y 处行业**短端**（CoreWeave 6y、hyperscaler 5–6y）。
- **⚠️ 折旧不计入 COGS**——单列。所以分部「~67% 毛利率」**虚高**，真正要看经营亏损 + OCF。
- **激进度评分：保守偏中性（综合 ~−0.5）**——矿机寿命短、退役即时减值、R&D 全费用化、无 cost-to-cost。无激进红旗。真正的 watch-item 是 1.9GW+ 在建产能未来带来的 D&A / 资本化利息跳升。

```mermaid

  title IREN 逐年变更 / 重大事件时间线

- **重述（H3，已确认）**：仅**现金流量表重分类**——把「出售已挖比特币的收入」从**经营**移到**投资**活动（IAS 7.16(b)，BTC=无形资产）。SEC 三轮问询后 IREN 让步。**对损益/资产/权益/期末现金零影响**，只是历史经营现金流被调低。★ [6-K](https://www.sec.gov/Archives/edgar/data/1878848/000187884825000027/irenlimited-6krestatemento.htm)

- **Adj EBITDA 改定义（H4）**：FY26 起剔除「debt conversion inducement expense」（Q2 FY26 = $111.8m）。属合理一次性加回，但制造可比性断层。

**三点判断**：
1. **Capex 不是异类，backlog-vs-收入差距才是**：IREN Capex/收入(~2.2×)正好是中位；真正的 standout 是 $13.1bn 合同 vs $501m 已确认收入（26×），季度 AI 收入仅 $33.6m。但此 gap 在转型同业里属**中段**（APLD 76×、CORZ 31×）——合理且必要，风险在**时点/通电**，不在花钱多少。
2. **融资结构是 IREN 最差的一轴**：~$6.75bn 近乎纯可转债，convert 依赖度全组最高；CoreWeave 用合同现金流支撑的定期贷款，NBIS/HUT 轻杠杆。摊薄+再融资悬顶是 IREN 独有的负面。
3. **转型曲线中后段，但 backlog 质量最佳**：AI 仅占收入 ~23%，落后 CORZ/APLD，与 WULF/CIFR 持平，领先纯矿企；但对手方质量最高（Microsoft + NVIDIA 直签 vs 同业经 Fluidstack/CoreWeave 转手）。

## 17. 风险因素（详见 `08_risk_factors.md`，按重要性排序）

1. **融资/再融资与摊薄**：~$6.75bn 可转债 + 持续增发；裸跑道 ~8.8 月；5GW 建设需 ~$10–12bn，远超当前流动性。
2. **执行/交付**：1,210MW/5GW、150k–600k GPU 的通电与调试时点；任何延迟直接推迟收入 ramp。
3. **客户集中**：两客户 + 同一园区；Microsoft 自身也是 hyperscaler（客户即潜在对手）。
4. **比特币价格**：当前现金流主体仍是挖矿，BTC 跌价直接打击过渡期现金流（Q3 收入降即因币价 + 退役矿机）。
5. **电力/电网**：ERCOT 大负荷接入审批、电价、curtailment。
6. **治理/控制**：创始人 43.5% 控制 + 移除业绩门槛 + 分类董事会至 2032。
7. **控制与审计史**：going-concern（FY24）+ 重大缺陷 + 重述 + 换审计师 = 治理/控制红旗簇（虽多已修复，仍需跟踪 KPMG 首份审计）。
8. **NVIDIA 依赖与循环**：芯片供给、认股权稀释、对手方循环。

## 18. 我的论点（含反方观点）

### 论点 1 — 这是「按已签约 ARR 定价、收入尚未 ramp」的高确信度 AI 基建期权，但全部价值押在 2026–2028 的完美执行上
**证据**：① $13.1bn Microsoft+NVIDIA 合同是真实签署的 MDA（★8-K Item 1.01）；② 但 RPO 仅 $710.3m（非 $13.1bn），季度 AI 收入仅 $33.6m，差距 26×（◆）；③ 5GW secured power + 全 freehold 站点是真护城河（★10-K）。
**反方**：「Microsoft+NVIDIA 背书 + 5GW 电力 = 稳了，ARR 会随通电兑现」。**我的反驳**：合同真，但「secured power ≠ delivered revenue」；RPO 才是法律口径的未来收入，只有 $0.71bn；执行+融资风险前置。

### 论点 2 — GAAP headline 在两个方向都是幻觉，真实经营仍在亏损/勉强打平
**证据**：① FY25 报告净利 +$86.9m 中 ~91% 是非现金 FV 收益，真实经营 ≈ +$7.6m（◆剥离测试）；② 9M FY26 报告净亏仅 $(18.6)m，却掩盖经营亏损 $(426)m（★）；③ 折旧不入 COGS，使分部毛利率虚高（★10-K）。
**反方**：「Adj EBITDA $59.5m / 41% margin 说明单位经济好」。**我的反驳**：Adj EBITDA 加回了真实的 D&A、减值、SBC；硬件密集型公司应看 GAAP 经营利润 + OCF + capex。

### 论点 3 — 融资与摊薄是约束性瓶颈，也是同业里最差的一轴；生存 = 持续资本市场准入
**证据**：① ~$6.75bn 可转债（convert 依赖度全组最高，§15）；② 裸跑道 ~8.8 月、年化烧 ~$3.0bn（◆）；③ 负 APIC $(1.73bn)、9M 增 ~99M 股、NVIDIA 循环认股权（★）；④ 创始人控制 + 移除业绩门槛（★DEF 14A）。
**反方**：「可转债票息 0–1%、后置到 2033；现金 $2.6bn + Microsoft 20% 预付 + GPU 融资足够」。**我的反驳**：$34 股价下可转债深度价外 → 若股价低迷即变再融资风险；建设需 $10–12bn，远超当前流动性。
